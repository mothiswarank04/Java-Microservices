spring:
  application:
    name: api-gateway
  config:
    import: "optional:configserver:http://localhost:8088"
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: employee-service
              uri: lb://employee-service
              predicates:
                - Path=/employee/**
            - id: department-service
              uri: lb://department-service
              predicates:
                - Path=/department/**

server:
  port: 8080


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8721/eureka/

management:
  tracing:
    sampling:
      probability: 1.0

