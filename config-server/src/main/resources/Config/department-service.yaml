server:
  port: 8086

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8721/eureka/

management:
  tracing:
    sampling:
      probability: 1.0


spring:
  datasource:
    url: jdbc:mysql://localhost:3306/departmen_mc
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true